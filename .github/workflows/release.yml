name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release body
        id: release_body
        shell: bash
        run: |
          node scripts/extract-changelog.mjs ${{ github.ref_name }}
          {
            echo 'body<<RELEASE_EOF'
            cat release-body.md
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MD Forge ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_body.outputs.body }}
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Upload portable exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/MD Forge.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
